[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "22"
  PYTHON_VERSION = "3.11"
  CHESSKE_INTERNAL_API_BASE = "http://38.242.228.254/api"
  NEXT_PUBLIC_CHESSKE_API_BASE = "/api"

[[redirects]]
  from = "/api/*"
  to = "http://38.242.228.254/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/player/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[edge_functions]]
  path = "/*"
  function = "bot-guard"

[[plugins]]
  package = "@netlify/plugin-nextjs"
